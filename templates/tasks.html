<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>我的任务 - 小果</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            -webkit-overflow-scrolling: touch;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            height: 100%;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: #f0f2f5;
            color: #333;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            padding: 14px 16px;
            padding-top: max(14px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .navbar a {
            color: #667eea;
            text-decoration: none;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .navbar .title {
            flex: 1;
            text-align: center;
            font-size: 17px;
            font-weight: 600;
            margin-right: 40px;
        }
        .add-btn {
            background: linear-gradient(135deg, #ffa502, #ff6348);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin: 16px;
        }
        .tasks-container {
            flex: 1;
            padding: 0 16px 16px;
            overflow-y: auto;
        }
        .task-card {
            background: white;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .task-card.completed .task-title {
            text-decoration: line-through;
            color: #999;
        }
        .task-checkbox {
            width: 22px;
            height: 22px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: #52c41a;
        }
        .task-content {
            flex: 1;
        }
        .task-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
        }
        .task-title:hover {
            background: #f5f5f5;
        }
        .task-title-input {
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            padding: 2px 4px;
            border: 1px solid #667eea;
            border-radius: 4px;
            font-family: inherit;
        }
        .task-desc {
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
        }
        .task-desc:hover {
            background: #f5f5f5;
        }
        .task-desc-input {
            font-size: 13px;
            width: 100%;
            padding: 2px 4px;
            border: 1px solid #667eea;
            border-radius: 4px;
            font-family: inherit;
            resize: none;
        }
        .task-meta {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .task-date, .task-priority {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 10px;
            cursor: pointer;
        }
        .task-date {
            background: #e6f7ff;
            color: #1890ff;
        }
        .task-date-input {
            font-size: 12px;
            padding: 2px 4px;
            border: 1px solid #667eea;
            border-radius: 4px;
        }
        .priority-low { background: #f5f5f5; color: #999; }
        .priority-medium { background: #fff7e6; color: #fa8c16; }
        .priority-high { background: #fff1f0; color: #f5222d; }
        .task-delete {
            color: #999;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            opacity: 0.6;
        }
        .task-delete:hover {
            opacity: 1;
            color: #f5222d;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 4px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        .modal-btns {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .modal-btns button {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-cancel {
            background: #f5f5f5;
            border: none;
            color: #666;
        }
        .btn-save {
            background: linear-gradient(135deg, #ffa502, #ff6348);
            border: none;
            color: white;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/">← 返回</a>
        <div class="title">✓ 我的任务</div>
    </div>

    <button class="add-btn" onclick="showModal()">+ 新建任务</button>

    <div class="tasks-container" id="tasksContainer">
        <div class="empty-state">暂无任务，点击上方按钮添加</div>
    </div>

    <!-- Add Task Modal -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">新建任务</div>
            <div class="form-group">
                <label>标题 *</label>
                <input type="text" id="inputTitle" placeholder="输入任务标题">
            </div>
            <div class="form-group">
                <label>描述</label>
                <textarea id="inputDesc" rows="2" placeholder="可选描述"></textarea>
            </div>
            <div class="form-group">
                <label>截止日期</label>
                <input type="date" id="inputDate">
            </div>
            <div class="form-group">
                <label>优先级</label>
                <select id="inputPriority">
                    <option value="1">低</option>
                    <option value="2" selected>中</option>
                    <option value="3">高</option>
                </select>
            </div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="hideModal()">取消</button>
                <button class="btn-save" onclick="saveTask()">保存</button>
            </div>
        </div>
    </div>

    <script>
        let tasks = [];

        // Load tasks on page load
        document.addEventListener('DOMContentLoaded', loadTasks);

        async function loadTasks() {
            try {
                const resp = await fetch('/api/tasks');
                const data = await resp.json();
                tasks = data.tasks || [];
                renderTasks();
            } catch (e) {
                console.error('加载任务失败:', e);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        function renderTasks() {
            const container = document.getElementById('tasksContainer');
            if (tasks.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无任务，点击上方按钮添加</div>';
                return;
            }
            container.innerHTML = tasks.map(task => `
                <div class="task-card ${task.completed ? 'completed' : ''}" data-id="${task.id}">
                    <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''}
                           onchange="toggleComplete(${task.id}, this.checked)">
                    <div class="task-content">
                        <div class="task-title" onclick="editField(${task.id}, 'title', this)">${escapeHtml(task.title)}</div>
                        <div class="task-desc" onclick="editField(${task.id}, 'desc', this)">${task.description ? escapeHtml(task.description) : '无描述'}</div>
                        <div class="task-meta">
                            <span class="task-date" onclick="editField(${task.id}, 'date', this)">${task.due_date || '无日期'}</span>
                            <span class="task-priority priority-${task.priority === 1 ? 'low' : task.priority === 2 ? 'medium' : 'high'}"
                                  onclick="cyclePriority(${task.id}, this)">
                                ${task.priority === 1 ? '低' : task.priority === 2 ? '中' : '高'}
                            </span>
                        </div>
                    </div>
                    <span class="task-delete" onclick="deleteTask(${task.id})">×</span>
                </div>
            `).join('');
        }

        async function toggleComplete(id, completed) {
            await updateTask(id, { completed: completed ? 1 : 0 });
            loadTasks();
        }

        async function deleteTask(id) {
            if (!confirm('确定删除这个任务？')) return;
            await fetch('/api/tasks/' + id, { method: 'DELETE' });
            loadTasks();
        }

        async function updateTask(id, data) {
            await fetch('/api/tasks/' + id, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
        }

        function editField(id, field, el) {
            const current = field === 'title' ? el.textContent :
                           field === 'desc' ? (tasks.find(t => t.id === id).description || '') :
                           tasks.find(t => t.id === id).due_date || '';

            const input = document.createElement(field === 'desc' ? 'textarea' : 'input');
            input.className = field === 'title' ? 'task-title-input' :
                             field === 'desc' ? 'task-desc-input' : 'task-date-input';
            if (field === 'desc') input.rows = 2;
            if (field === 'date') input.type = 'date';
            input.value = field === 'title' ? el.textContent.trim() :
                         field === 'desc' ? current : current;

            const original = el.outerHTML;
            el.replaceWith(input);
            input.focus();

            const save = async () => {
                const value = input.value;
                const data = field === 'title' ? { title: value } :
                           field === 'desc' ? { description: value } :
                           { due_date: value };
                await updateTask(id, data);
                loadTasks();
            };

            input.addEventListener('blur', save);
            input.addEventListener('keydown', e => {
                if (e.key === 'Enter' && field !== 'desc') { save(); }
                if (e.key === 'Escape') { loadTasks(); }
            });
        }

        async function cyclePriority(id, el) {
            const task = tasks.find(t => t.id === id);
            const next = task.priority >= 3 ? 1 : task.priority + 1;
            await updateTask(id, { priority: next });
            loadTasks();
        }

        function showModal() {
            document.getElementById('taskModal').classList.add('show');
            document.getElementById('inputTitle').focus();
        }

        function hideModal() {
            document.getElementById('taskModal').classList.remove('show');
            document.getElementById('inputTitle').value = '';
            document.getElementById('inputDesc').value = '';
            document.getElementById('inputDate').value = '';
            document.getElementById('inputPriority').value = '2';
        }

        async function saveTask() {
            const title = document.getElementById('inputTitle').value.trim();
            if (!title) { alert('请输入标题'); return; }

            const data = {
                title: title,
                description: document.getElementById('inputDesc').value.trim(),
                due_date: document.getElementById('inputDate').value,
                priority: parseInt(document.getElementById('inputPriority').value)
            };

            await fetch('/api/tasks', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            hideModal();
            loadTasks();
        }
    </script>
</body>
</html>

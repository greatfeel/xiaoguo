<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>高考日历 - 小果</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            -webkit-overflow-scrolling: touch;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            height: 100%;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: #f0f2f5;
            color: #333;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            padding: 14px 16px;
            padding-top: max(14px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            -webkit-position: sticky;
        }
        .navbar a {
            color: #667eea;
            text-decoration: none;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .navbar .title {
            flex: 1;
            text-align: center;
            font-size: 17px;
            font-weight: 600;
            margin-right: 40px;
        }
        .calendar-container {
            flex: 1;
            padding: 0;
            display: flex;
            flex-direction: column;
        }
        .calendar-help {
            padding: 12px 16px;
            background: #fff3cd;
            border-bottom: 1px solid #ffc107;
            font-size: 13px;
            color: #856404;
            text-align: center;
        }
        .calendar-help a {
            color: #004085;
            text-decoration: underline;
        }
        .calendar-container iframe {
            flex: 1;
            border: none;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/">← 返回</a>
        <div class="title">📅 高考日历</div>
    </div>
    <div class="calendar-help">
        若 iframe 加载失败，可<a href="https://outlook.live.com/owa/calendar/26555a2a-43dc-4283-a125-ed904dea08e1/e0a7b3ff-bb52-4509-a9a2-c84ec7381e5b/cid-FF1DD0E83EAD4EF6/index.html" target="_blank">在新窗口打开日历</a>
    </div>
    <div class="calendar-container">
        <iframe
            src="https://outlook.live.com/owa/calendar/26555a2a-43dc-4283-a125-ed904dea08e1/e0a7b3ff-bb52-4509-a9a2-c84ec7381e5b/cid-FF1DD0E83EAD4EF6/index.html"
            allowfullscreen
            allow="accelerometer; ambient-light-sensor; autoplay; battery; camera; display-capture; document-domain; encrypted-media; execution-while-not-rendered; execution-while-out-of-viewport; fullscreen; geolocation; gyroscope; magnetometer; microphone; midi; navigation-override; payment; picture-in-picture; publickey-credentials-get; sync-xhr; usb; xr-spatial-tracking">
        </iframe>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>高考日历</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            -webkit-overflow-scrolling: touch;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            padding: 15px 20px;
            padding-top: max(15px, env(safe-area-inset-top));
            text-align: center;
            color: white;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }
        .back-link {
            position: absolute;
            left: 15px;
            top: max(15px, env(safe-area-inset-top));
            color: white;
            text-decoration: none;
            font-size: 16px;
            padding: 5px 10px;
        }
        .calendar-container {
            flex: 1;
            padding: 10px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            overflow: hidden;
        }
        .calendar-wrapper {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            height: 100%;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back-link">←</a>
        <h1>高考日历</h1>
    </div>
    <div class="calendar-container">
        <div class="calendar-wrapper">
            <iframe src="https://teamup.com/ks9pi5rqzzs133uwh3?tz=Calendar%20default&showProfileAndInfo=0&showSidepanel=1&showViewHeader=1&showAgendaDetails=0&showDateControls=1&showDateRange=1" loading="lazy" frameborder="0"></iframe>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="format-detection" content="telephone=no">
    <title>热点新闻 - 小果</title>
    <!-- DNS 预解析和预连接，加速首次加载 -->
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            -webkit-overflow-scrolling: touch;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            overscroll-behavior: contain;
            /* Safari 性能优化 */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: #f0f2f5;
            color: #333;
            padding-bottom: calc(60px + env(safe-area-inset-bottom));
            /* 防止 iOS 上的文本调整大小 */
            -webkit-text-size-adjust: 100%;
        }
        /* 顶部导航 */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            padding: 14px 16px;
            padding-top: max(14px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            /* Safari 修复：确保 sticky 生效 */
            -webkit-position: sticky;
        }
        .navbar a {
            color: #667eea;
            text-decoration: none;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .navbar .title {
            flex: 1;
            text-align: center;
            font-size: 17px;
            font-weight: 600;
            margin-right: 40px;
        }
        /* 日期条 */
        .date-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top));
            font-size: 15px;
            font-weight: 500;
            position: sticky;
            top: 49px;
            z-index: 90;
            /* Safari 修复 */
            -webkit-position: sticky;
        }
        /* 分类条 */
        .category-bar {
            background: white;
            padding: 10px 16px;
            font-size: 16px;
            font-weight: 600;
            color: #333;
            border-left: 4px solid;
            margin: 16px 12px 8px;
            border-radius: 0 8px 8px 0;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            /* Safari 触摸优化 */
            -webkit-appearance: none;
        }
        .category-bar.science { border-color: #2ecc71; }
        .category-bar.tech { border-color: #3498db; }
        .category-bar.idaily { border-color: #e74c3c; }
        /* 新闻卡片 */
        .news-card {
            background: white;
            margin: 8px 12px;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .news-card h3 {
            font-size: 16px;
            line-height: 1.5;
            color: #222;
            margin-bottom: 8px;
        }
        .news-card .summary {
            font-size: 14px;
            line-height: 1.7;
            color: #555;
        }
        .news-card .summary p { margin-bottom: 0.8em; }
        .news-card .summary p:last-child { margin-bottom: 0; }
        .news-card .summary h3 { font-size: 14px; margin-top: 0.8em; }
        .news-card .summary ul, .news-card .summary ol {
            padding-left: 1.5em;
            margin: 0.5em 0;
        }
        .news-card .summary li {
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 4px;
        }
        .news-card .summary a {
            color: #667eea;
            text-decoration: none;
        }
        .news-card .meta {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }
        .news-card .meta a {
            font-size: 12px;
            color: #667eea;
            text-decoration: none;
        }
        /* 展开收起 */
        .news-card .summary.collapsed {
            max-height: 100px;
            overflow: hidden;
            position: relative;
        }
        .news-card .summary.collapsed::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(transparent, white);
        }
        .toggle-btn {
            display: block;
            width: 100%;
            text-align: center;
            padding: 12px 6px;
            font-size: 13px;
            color: #667eea;
            background: none;
            border: none;
            cursor: pointer;
            margin-top: 4px;
            /* Safari 触摸优化 */
            -webkit-appearance: none;
            -webkit-tap-highlight-color: rgba(102, 126, 234, 0.1);
            border-radius: 8px;
        }
        .toggle-btn:active {
            background: rgba(102, 126, 234, 0.05);
        }
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 14px;
        }
        .loading .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e9ecef;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .end-message {
            text-align: center;
            padding: 30px;
            color: #aaa;
            font-size: 14px;
        }
        .empty-category {
            text-align: center;
            padding: 16px;
            color: #bbb;
            font-size: 13px;
            margin: 0 12px;
        }
        /* 语言 Tab 切换器 */
        .lang-tabs {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
        }
        .lang-tab {
            padding: 3px 10px;
            font-size: 12px;
            border-radius: 12px;
            border: 1px solid #d0d7de;
            background: none;
            cursor: pointer;
            color: #555;
            -webkit-appearance: none;
            -webkit-tap-highlight-color: rgba(102,126,234,0.1);
            transition: background 0.15s, color 0.15s;
        }
        .lang-tab.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }
        .tts-btn {
            margin-left: auto;
            padding: 3px 10px;
            font-size: 12px;
            border-radius: 12px;
            border: 1px solid #d0d7de;
            background: none;
            cursor: pointer;
            color: #555;
            -webkit-appearance: none;
            -webkit-tap-highlight-color: rgba(102,126,234,0.1);
        }
        .tts-btn.playing {
            border-color: #e74c3c;
            color: #e74c3c;
        }
        .tts-style-btn {
            margin-left: auto;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 12px;
            border: 1px solid #d0d7de;
            background: #f8f9fb;
            color: #444;
            cursor: pointer;
            -webkit-appearance: none;
            -webkit-tap-highlight-color: rgba(102,126,234,0.1);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/">← 返回</a>
        <span class="title">热点新闻</span>
        <button id="tts-style-btn" class="tts-style-btn" type="button">语音: 标准</button>
    </nav>
    <div id="news-container"></div>
    <div id="loading" class="loading" style="display:none;">
        <span class="spinner"></span>加载中...
    </div>
    <div id="end-message" class="end-message" style="display:none;">
        没有更多新闻了
    </div>

    <script>
        const container = document.getElementById('news-container');
        const loadingEl = document.getElementById('loading');
        const endEl = document.getElementById('end-message');
        const ttsStyleBtn = document.getElementById('tts-style-btn');

        let allDates = [];
        let currentDateIndex = 0;
        let isLoading = false;
        let allLoaded = false;
        const displayedDates = new Set();

        // TTS 状态（改为后端 Edge TTS 音频播放）
        const ttsSupported = !!window.Audio;
        let ttsQueue = [];
        let ttsPlaying = false;
        let ttsCurrentIdx = -1;
        let ttsRequestToken = 0;
        // iOS Safari 需要特殊的音频处理
        let ttsAudio = null;
        let ttsAudioContext = null;
        const ttsUrlCache = new Map();
        const ttsStyles = ['standard', 'gentle', 'broadcast'];
        const ttsStyleLabels = {
            standard: '标准',
            gentle: '温柔',
            broadcast: '播报',
        };
        let ttsStyle = localStorage.getItem('news_tts_style') || 'standard';
        if (!ttsStyles.includes(ttsStyle)) ttsStyle = 'standard';

        // 初始化音频（iOS 需要在用户交互中初始化）
        function initTtsAudio() {
            if (!ttsSupported) return null;
            if (ttsAudio) return ttsAudio;
            ttsAudio = new Audio();
            // iOS Safari 需要设置这些属性
            ttsAudio.playsInline = true;
            ttsAudio.preload = 'auto';
            return ttsAudio;
        }

        // 检测是否为 iOS 设备
        function isIOS() {
            return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        }

        // 检测是否为 Safari
        function isSafari() {
            return /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
        }

        function refreshTtsStyleButton() {
            if (!ttsStyleBtn) return;
            ttsStyleBtn.textContent = '语音: ' + (ttsStyleLabels[ttsStyle] || '标准');
        }

        if (ttsStyleBtn) {
            if (!ttsSupported) {
                ttsStyleBtn.style.display = 'none';
            } else {
                refreshTtsStyleButton();
                ttsStyleBtn.addEventListener('click', () => {
                    const idx = ttsStyles.indexOf(ttsStyle);
                    ttsStyle = ttsStyles[(idx + 1) % ttsStyles.length];
                    localStorage.setItem('news_tts_style', ttsStyle);
                    refreshTtsStyleButton();
                    ttsStop();
                });
            }
        }

        function normalizeTtsText(raw, lang) {
            if (!raw) return '';
            return raw
                .replace(/<[^>]+>/g, ' ')
                .replace(/https?:\/\/\S+/g, ' ')
                .replace(/\s+/g, ' ')
                .replace(/[\[\]{}|*_#`~]/g, ' ')
                .replace(/\s+([,.;!?，。！？：；])/g, '$1')
                .replace(/([。！？!?])(?=[^\s])/g, '$1 ')
                .replace(/([.;；:：])(?=[^\s])/g, '$1 ')
                .trim();
        }

        function splitTtsChunks(text, lang, maxLen = 180) {
            if (!text) return [];

            const sentenceRegex = lang === 'en'
                ? /[^.!?;:]+[.!?;:]?/g
                : /[^。！？；：]+[。！？；：]?/g;
            const sentences = text.match(sentenceRegex) || [text];

            const chunks = [];
            let current = '';
            for (let i = 0; i < sentences.length; i++) {
                const s = sentences[i].trim();
                if (!s) continue;

                if (!current) {
                    current = s;
                    continue;
                }

                if ((current + ' ' + s).length <= maxLen) {
                    current += ' ' + s;
                } else {
                    chunks.push(current);
                    current = s;
                }
            }

            if (current) chunks.push(current);
            return chunks;
        }

        async function fetchTtsAudioUrl(text, lang) {
            const key = lang + '::' + ttsStyle + '::' + text;
            if (ttsUrlCache.has(key)) return ttsUrlCache.get(key);

            const res = await fetch('/api/tts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, lang, style: ttsStyle }),
            });
            if (!res.ok) {
                throw new Error('TTS request failed: ' + res.status);
            }

            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            ttsUrlCache.set(key, url);
            return url;
        }

        // 预加载 TTS 音频（在后台静默加载）
        async function preloadTtsAudio(article, lang, btn) {
            if (!ttsSupported) return;

            const title = lang === 'en' ? (article.title_en || article.title) : article.title;
            const bodyRaw = lang === 'en' ? (article.content_en || article.content) : article.content;
            const plain = normalizeTtsText(bodyRaw, lang);
            const fullText = normalizeTtsText(title + (lang === 'en' ? '. ' : '。') + plain, lang);
            if (!fullText) return;

            const chunks = splitTtsChunks(fullText, lang, 220);
            const finalText = chunks.join(lang === 'en' ? ' ' : '。');

            // 检查是否已缓存
            const key = lang + '::' + ttsStyle + '::' + finalText;
            if (ttsUrlCache.has(key)) return;

            try {
                // 显示加载中状态
                if (btn) {
                    btn.dataset.preloading = 'true';
                    btn.style.opacity = '0.6';
                }

                await fetchTtsAudioUrl(finalText, lang);

                // 加载完成，更新按钮状态
                if (btn) {
                    btn.dataset.preloading = 'false';
                    btn.dataset.preloaded = 'true';
                    btn.style.opacity = '1';
                }
            } catch (err) {
                console.error('TTS 预加载失败:', err);
                if (btn) {
                    btn.dataset.preloading = 'false';
                    btn.style.opacity = '1';
                }
            }
        }

        // 批量预加载 TTS（仅对没有预生成 URL 的文章）
        function batchPreloadTts(articles, maxPreload = 3) {
            if (!ttsSupported) return;
            let queued = 0;
            for (let i = 0; i < articles.length && queued < maxPreload; i++) {
                const article = articles[i];
                const lang = article.title_en ? 'en' : 'zh';
                // 当前风格是 standard 且已有预生成 URL，无需预加载
                if (ttsStyle === 'standard' && (lang === 'zh' ? article.audio_url_zh : article.audio_url_en)) {
                    continue;
                }
                const delay = queued * 300;
                setTimeout(() => preloadTtsAudio(article, lang, null), delay);
                queued++;
            }
        }

        function ttsStop() {
            if (!ttsSupported) return;
            ttsRequestToken += 1;
            const audio = initTtsAudio();
            if (audio) {
                audio.pause();
                audio.currentTime = 0;
                audio.src = '';
            }
            ttsPlaying = false;
            ttsCurrentIdx = -1;
            for (let i = 0; i < ttsQueue.length; i++) {
                const btn = ttsQueue[i].btn;
                if (btn) {
                    btn.textContent = '▶';
                    btn.classList.remove('playing');
                }
            }
        }

        async function ttsPlayAt(idx) {
            if (!ttsSupported) return;
            if (idx < 0 || idx >= ttsQueue.length) return;

            // 确保音频已初始化（iOS 需要在点击事件中创建）
            const audio = initTtsAudio();
            if (!audio) return;

            const item = ttsQueue[idx];
            const lang = item.getLang();
            const title = lang === 'en' ? (item.article.title_en || item.article.title) : item.article.title;
            const bodyRaw = lang === 'en' ? (item.article.content_en || item.article.content) : item.article.content;
            const plain = normalizeTtsText(bodyRaw, lang);
            const fullText = normalizeTtsText(title + (lang === 'en' ? '. ' : '。') + plain, lang);
            const chunks = splitTtsChunks(fullText, lang, 220);
            const finalText = chunks.join(lang === 'en' ? ' ' : '。');
            if (!finalText) return;

            const token = ++ttsRequestToken;

            ttsCurrentIdx = idx;
            ttsPlaying = true;
            item.btn.textContent = '⏸';
            item.btn.classList.add('playing');

            try {
                // 优先使用预生成 MP3（仅 standard 风格）
                const pregenUrl = ttsStyle === 'standard'
                    ? (lang === 'en' ? item.article.audio_url_en : item.article.audio_url_zh)
                    : null;

                let url;
                if (pregenUrl) {
                    url = pregenUrl;  // 直接使用，零延迟
                } else {
                    // 检查内存缓存 → 否则请求 /api/tts（服务端有磁盘缓存，第二次也很快）
                    const key = lang + '::' + ttsStyle + '::' + finalText;
                    url = ttsUrlCache.get(key);
                    if (!url) {
                        item.btn.textContent = '⏳';
                        url = await fetchTtsAudioUrl(finalText, lang);
                    }
                }

                if (token !== ttsRequestToken) return;

                // iOS Safari：需要先停止之前的音频
                audio.pause();
                audio.currentTime = 0;

                audio.src = url;

                // iOS 需要预加载
                if (isIOS() || isSafari()) {
                    try {
                        audio.load();
                    } catch (e) {
                        console.log('Preload warning:', e);
                    }
                }

                audio.onended = () => {
                    if (token !== ttsRequestToken) return;
                    ttsPlaying = false;
                    ttsCurrentIdx = -1;
                    item.btn.textContent = '▶';
                    item.btn.classList.remove('playing');
                };
                audio.onerror = (e) => {
                    console.error('Audio error:', e);
                    if (token !== ttsRequestToken) return;
                    ttsPlaying = false;
                    ttsCurrentIdx = -1;
                    item.btn.textContent = '▶';
                    item.btn.classList.remove('playing');
                };

                // iOS Safari：play() 必须在用户点击处理程序中直接调用
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.catch(err => {
                        console.error('Play failed:', err);
                        if (token !== ttsRequestToken) return;
                        ttsPlaying = false;
                        ttsCurrentIdx = -1;
                        item.btn.textContent = '▶';
                        item.btn.classList.remove('playing');
                    });
                }
            } catch (err) {
                console.error('TTS 播放失败:', err);
                ttsPlaying = false;
                ttsCurrentIdx = -1;
                item.btn.textContent = '▶';
                item.btn.classList.remove('playing');
            }
        }

        function hasAnyNews(data) {
            return !!((data.science && data.science.length)
                || (data.tech && data.tech.length)
                || (data.idaily && data.idaily.length));
        }

        /**
         * 安全地设置元素的 HTML 内容（使用 DOMPurify 清理）
         */
        function safeSetHTML(el, html) {
            el.innerHTML = DOMPurify.sanitize(html, {
                ALLOWED_TAGS: ['p', 'a', 'h2', 'h3', 'h4', 'ul', 'ol', 'li',
                               'strong', 'em', 'br', 'img', 'blockquote', 'pre', 'code'],
                ALLOWED_ATTR: ['href', 'target', 'rel', 'src', 'alt'],
            });
        }

        // 显示加载状态的辅助函数
        function showLoading() {
            container.innerHTML = '';
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            const spinner = document.createElement('span');
            spinner.className = 'spinner';
            loadingDiv.appendChild(spinner);
            loadingDiv.appendChild(document.createTextNode('加载中...'));
            container.appendChild(loadingDiv);
        }

        function showError(message) {
            container.innerHTML = '';
            const errorDiv = document.createElement('div');
            errorDiv.className = 'end-message';
            errorDiv.textContent = message;
            container.appendChild(errorDiv);
        }

        // 初始化：获取可用日期列表并加载新闻
        async function init() {
            try {
                // 显示加载状态
                showLoading();

                const today = new Date().toISOString().slice(0, 10);

                // 并行请求：同时获取日期列表和当天新闻，提高加载速度
                const [datesRes, firstRes] = await Promise.all([
                    fetch('/api/dates').catch(() => ({ json: async () => ({ dates: [] }) })),
                    fetch('/api/news/' + encodeURIComponent(today)).catch(() => null)
                ]);

                // 处理日期列表
                if (datesRes) {
                    const datesData = await datesRes.json();
                    allDates = (datesData.dates || []).filter(d => !displayedDates.has(d));
                }

                // 处理新闻数据
                if (firstRes && firstRes.ok) {
                    const firstData = await firstRes.json();
                    if (hasAnyNews(firstData)) {
                        container.innerHTML = ''; // 清除加载状态
                        renderDay(firstData);
                        displayedDates.add(firstData.actual_date || firstData.date);
                    } else if (allDates.length > 0) {
                        // 当天没有新闻，加载最近一天
                        showLoading();
                        await loadNextDay();
                    } else {
                        showError('暂无新闻');
                        return;
                    }
                } else if (allDates.length > 0) {
                    // 请求失败但有可用日期，尝试加载
                    container.innerHTML = '';
                    await loadNextDay();
                } else {
                    showError('加载失败，请刷新重试');
                    return;
                }

                setupInfiniteScroll();
            } catch (err) {
                console.error('Init error:', err);
                showError('加载失败，请刷新重试');
            }
        }

        // 加载下一天的新闻
        async function loadNextDay() {
            if (isLoading || allLoaded) return;
            if (currentDateIndex >= allDates.length) {
                allLoaded = true;
                endEl.style.display = 'block';
                return;
            }

            isLoading = true;
            loadingEl.style.display = 'block';

            const date = allDates[currentDateIndex];
            try {
                const res = await fetch('/api/news/' + encodeURIComponent(date));
                const data = await res.json();
                const resolvedDate = data.actual_date || data.date;
                if (hasAnyNews(data) && !displayedDates.has(resolvedDate)) {
                    renderDay(data);
                    displayedDates.add(resolvedDate);
                }
                currentDateIndex++;
            } catch (err) {
                console.error('加载新闻失败:', err);
            } finally {
                isLoading = false;
                loadingEl.style.display = 'none';
            }
        }

        // 渲染一天的新闻
        function renderDay(data) {
            ttsQueue = [];  // 重置队列

            const dayEl = document.createElement('div');
            dayEl.className = 'day-section';

            // 日期条
            const dateBar = document.createElement('div');
            dateBar.className = 'date-bar';
            dateBar.textContent = '📅 ' + data.date;
            dayEl.appendChild(dateBar);

            // 科学新闻
            renderCategory(dayEl, 'science', '🔬 科学', data.science);
            // 技术新闻
            renderCategory(dayEl, 'tech', '💻 技术', data.tech);
            // 热点新闻（iDaily）
            renderCategory(dayEl, 'idaily', '🔥 热点', data.idaily);

            container.appendChild(dayEl);
        }

        // 渲染一个分类
        function renderCategory(parent, cls, label, articles) {
            const bar = document.createElement('div');
            bar.className = 'category-bar ' + cls;
            bar.textContent = label;
            parent.appendChild(bar);

            if (!articles || articles.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'empty-category';
                empty.textContent = '暂无内容';
                parent.appendChild(empty);
                return;
            }

            // 批量预加载前几篇文章的 TTS 音频
            batchPreloadTts(articles, 3);

            for (let i = 0; i < articles.length; i++) {
                const article = articles[i];
                const card = document.createElement('div');
                card.className = 'news-card';
                const hasBilingual = !!(article.title_en && article.content_en);

                let currentLang = hasBilingual ? 'en' : 'zh';

                // 语言 Tab 行
                const langTabs = document.createElement('div');
                langTabs.className = 'lang-tabs';

                const enBtn = document.createElement('button');
                enBtn.className = 'lang-tab' + (currentLang === 'en' ? ' active' : '');
                enBtn.textContent = '英文';
                if (!hasBilingual) enBtn.style.display = 'none';

                const zhBtn = document.createElement('button');
                zhBtn.className = 'lang-tab' + (currentLang === 'zh' ? ' active' : '');
                zhBtn.textContent = '中文';

                const ttsBtn = document.createElement('button');
                ttsBtn.className = 'tts-btn';
                ttsBtn.textContent = '▶';
                if (!ttsSupported) ttsBtn.style.display = 'none';

                langTabs.appendChild(enBtn);
                langTabs.appendChild(zhBtn);
                langTabs.appendChild(ttsBtn);
                card.appendChild(langTabs);

                // 标题
                const titleEl = document.createElement('h3');
                function updateTitle() {
                    titleEl.textContent = currentLang === 'en'
                        ? (article.title_en || article.title)
                        : article.title;
                }
                updateTitle();
                card.appendChild(titleEl);

                // 内容
                const summaryEl = document.createElement('div');
                summaryEl.className = 'summary';

                function updateContent() {
                    const html = currentLang === 'en'
                        ? (article.content_en || article.content)
                        : article.content;
                    if (html.length > 300) summaryEl.classList.add('collapsed');
                    else summaryEl.classList.remove('collapsed');
                    safeSetHTML(summaryEl, html);
                }
                updateContent();
                card.appendChild(summaryEl);

                // 展开/收起
                const toggleBtn = document.createElement('button');
                toggleBtn.className = 'toggle-btn';
                function updateToggle() {
                    const html = currentLang === 'en'
                        ? (article.content_en || article.content)
                        : article.content;
                    if (html.length > 300) {
                        toggleBtn.style.display = 'block';
                        toggleBtn.textContent = summaryEl.classList.contains('collapsed') ? '展开全文' : '收起';
                    } else {
                        toggleBtn.style.display = 'none';
                    }
                }
                updateToggle();
                toggleBtn.addEventListener('click', () => {
                    summaryEl.classList.toggle('collapsed');
                    toggleBtn.textContent = summaryEl.classList.contains('collapsed') ? '展开全文' : '收起';
                });
                card.appendChild(toggleBtn);

                // 原文链接
                if (article.link) {
                    const meta = document.createElement('div');
                    meta.className = 'meta';
                    const link = document.createElement('a');
                    link.href = article.link;
                    link.target = '_blank';
                    link.rel = 'noopener';
                    link.textContent = '查看原文 →';
                    meta.appendChild(link);
                    card.appendChild(meta);
                }

                // Tab 切换事件
                enBtn.addEventListener('click', () => {
                    currentLang = 'en';
                    enBtn.classList.add('active'); zhBtn.classList.remove('active');
                    updateTitle(); updateContent(); updateToggle();
                });
                zhBtn.addEventListener('click', () => {
                    currentLang = 'zh';
                    zhBtn.classList.add('active'); enBtn.classList.remove('active');
                    updateTitle(); updateContent(); updateToggle();
                });

                // TTS 注册到队列
                const queueIdx = ttsQueue.length;
                ttsQueue.push({ article, getLang: () => currentLang, btn: ttsBtn });

                // 单个预加载此文章的 TTS（延迟执行，避免阻塞渲染）
                setTimeout(() => {
                    // 有预生成 URL 且当前为 standard 风格，无需预加载
                    const pregenExists = ttsStyle === 'standard' && (currentLang === 'zh' ? article.audio_url_zh : article.audio_url_en);
                    if (!pregenExists) {
                        preloadTtsAudio(article, currentLang, ttsBtn);
                    }
                }, queueIdx * 300);

                // TTS 按钮点击处理（必须在点击事件中直接调用 play 才能支持 iOS）
                ttsBtn.addEventListener('click', async () => {
                    // 初始化音频上下文（iOS 需要在用户交互中创建）
                    initTtsAudio();

                    if (ttsPlaying && ttsCurrentIdx === queueIdx) {
                        const audio = initTtsAudio();
                        if (audio) {
                            audio.pause();
                        }
                        ttsPlaying = false;
                        ttsBtn.textContent = '▶';
                        ttsBtn.classList.remove('playing');
                    } else if (!ttsPlaying && ttsCurrentIdx === queueIdx) {
                        // 继续播放
                        const audio = initTtsAudio();
                        if (audio && audio.paused && audio.src) {
                            const playPromise = audio.play();
                            if (playPromise !== undefined) {
                                playPromise.then(() => {
                                    ttsPlaying = true;
                                    ttsBtn.textContent = '⏸';
                                    ttsBtn.classList.add('playing');
                                }).catch(err => {
                                    console.error('Resume failed:', err);
                                });
                            }
                        } else {
                            ttsStop();
                            await ttsPlayAt(queueIdx);
                        }
                    } else {
                        ttsStop();
                        await ttsPlayAt(queueIdx);
                    }
                });

                parent.appendChild(card);
            }
        }

        // 无限滚动：Intersection Observer
        function setupInfiniteScroll() {
            const sentinel = document.createElement('div');
            sentinel.id = 'scroll-sentinel';
            sentinel.style.height = '1px';
            document.body.appendChild(sentinel);

            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && !isLoading && !allLoaded) {
                    loadNextDay();
                }
            }, { rootMargin: '200px' });

            observer.observe(sentinel);
        }

        init();
    </script>
</body>
</html>

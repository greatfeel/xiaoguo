<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>小果 - 首页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            -webkit-overflow-scrolling: touch;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px 50px;
            padding-top: max(40px, env(safe-area-inset-top));
            text-align: center;
            color: white;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .header p {
            font-size: 15px;
            opacity: 0.85;
        }
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            max-width: 500px;
            width: 100%;
            margin-top: -30px;
        }
        .app-card {
            background: white;
            border-radius: 16px;
            padding: 28px 20px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
        }
        .app-card.active:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }
        .app-card.active:active {
            transform: scale(0.98);
            transition: transform 0.1s;
        }
        .app-card.disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .app-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 14px;
        }
        .app-icon.news { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
        .app-icon.calendar { background: linear-gradient(135deg, #00b894, #00cec9); }
        .app-icon.tasks { background: linear-gradient(135deg, #ffa502, #ff6348); }
        .app-icon.writing { background: linear-gradient(135deg, #a29bfe, #6c5ce7); }
        .app-name {
            font-size: 15px;
            font-weight: 600;
            color: #333;
        }
        .app-desc {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        .badge-coming {
            display: inline-block;
            font-size: 10px;
            background: #e9ecef;
            color: #868e96;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>小果</h1>
        <p>每天学一点，成长看得见</p>
    </div>
    <div class="apps-grid">
        <a href="/news" class="app-card active">
            <div class="app-icon news">📰</div>
            <div class="app-name">热点新闻</div>
            <div class="app-desc">每日科技热点</div>
        </a>
        <a href="/calendar" class="app-card active">
            <div class="app-icon calendar">📅</div>
            <div class="app-name">高考日历</div>
            <div class="app-desc">备考倒计时</div>
        </a>
        <a href="/tasks" class="app-card active">
            <div class="app-icon tasks">✓</div>
            <div class="app-name">我的任务</div>
            <div class="app-desc">任务清单</div>
        </a>
        <div class="app-card disabled">
            <div class="app-icon writing">✍️</div>
            <div class="app-name">作文宝</div>
            <div class="app-desc">AI 写作助手</div>
            <span class="badge-coming">即将上线</span>
        </div>
    </div>
</body>
</html>
